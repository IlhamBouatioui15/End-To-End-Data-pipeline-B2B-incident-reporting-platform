global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'spark'
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['spark-master:8080']

  - job_name: 'airflow-superset'
    static_configs:
      - targets: ['statsd-exporter:9102']
