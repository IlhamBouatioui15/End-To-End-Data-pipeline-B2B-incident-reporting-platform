mappings:
  - match: "airflow.dag.*.*.success"
    name: "airflow_task_success_total"
    labels:
      dag_id: "$1"
      task_id: "$2"

  - match: "airflow.dag.*.*.failed"
    name: "airflow_task_failed_total"
    labels:
      dag_id: "$1"
      task_id: "$2"

  - match: "airflow.dag.*.*.duration"
    name: "airflow_task_duration_seconds"
    labels:
      dag_id: "$1"
      task_id: "$2"

  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_success_seconds"
    labels:
      dag_id: "$1"

  - match: "airflow.dagrun.duration.failed.*"
    name: "airflow_dagrun_duration_failed_seconds"
    labels:
      dag_id: "$1"

  - match: "airflow.executor.running_tasks"
    name: "airflow_executor_running_tasks"
    labels: {}

  - match: "airflow.executor.queued_tasks"
    name: "airflow_executor_queued_tasks"
    labels: {}

  - match: "airflow.scheduler.heartbeat"
    name: "airflow_scheduler_heartbeat"
    labels: {}

  - match: "airflow.scheduler.tasks.killed_externally"
    name: "airflow_scheduler_tasks_killed_externally"
    labels: {}