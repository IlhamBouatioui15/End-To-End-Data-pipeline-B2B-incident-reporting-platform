version: '3.8'

# ==============================================================
# VARIABLES D'ENVIRONNEMENT REQUISES (.env à la racine) :
#   DB_USER, DB_PASSWORD, DB_NAME, DB_PORT
#   JWT_SECRET_KEY, BASE_URL, BACKEND_PORT
#   AIRFLOW_UID (ex: 50000)
# ==============================================================
 
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    # --- CONFIGURATION EMAIL (SMTP) ---
    AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com
    AIRFLOW__SMTP__SMTP_STARTTLS: 'true'
    AIRFLOW__SMTP__SMTP_SSL: 'false'
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-tamtest67@gmail.com}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD}
    AIRFLOW__SMTP__SMTP_PORT: 587
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_USER:-tamtest67@gmail.com}
    # Permet à Airflow de lancer des conteneurs Docker
    DOCKER_HOST: unix:///var/run/docker.sock
    # Variables pour que les DAGs connaissent les services
    KAFKA_SERVER: kafka:29092
    DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-tam_db}@postgres:5432/${DB_NAME:-brise_db}
    MINIO_ENDPOINT: http://minio:9000
  volumes:
    - ./data_pipeline/airflow/dags:/opt/airflow/dags          # Tes DAGs Python
    - ./data_pipeline/airflow/logs:/opt/airflow/logs          # Logs des exécutions
    - ./data_pipeline/airflow/plugins:/opt/airflow/plugins    # Plugins custom
    - /var/run/docker.sock:/var/run/docker.sock # Accès Docker
  user: "0:0"
  depends_on:
    airflow-db:
      condition: service_healthy
  networks:
    - tam_network


services:
  postgres:
    image: postgres:15-alpine
    container_name: tam_dbpsql
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tam_db}
      POSTGRES_DB: ${DB_NAME:-brise_db}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brise_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tam_network
  dbt:
    build:
      context: .
      dockerfile: dockerfile.dbt
    container_name: tam_dbt
    volumes:
      - ./data_pipeline/tam_dbt:/usr/app/tam_dbt
      - ./data_pipeline/profiles.yml:/root/.dbt/profiles.yml
    environment:
      - DBT_PROFILES_DIR=/root/.dbt
    depends_on:
      - postgres
    entrypoint: ["tail", "-f", "/dev/null"] 
    networks:
      - tam_network
  # --- KAFKA ---
  kafka:
    image: apache/kafka:latest
    container_name: tam_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "EXTERNAL://localhost:9092,INTERNAL://kafka:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" 
    networks:
      - tam_network

  minio:
    image: minio/minio:latest
    container_name: tam_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    networks:
      - tam_network
  
  # ============================================================
  # BASE DE DONNÉES DÉDIÉE À AIRFLOW (séparée de ta DB métier)
  # ============================================================
 
  airflow-db:
    image: postgres:15-alpine
    container_name: tam_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tam_network
 
  # ============================================================
  # AIRFLOW — Initialisation (tourne une seule fois au démarrage)
  # ============================================================
 
  airflow-init:
    <<: *airflow-common
    container_name: tam_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname TAM \
          --role Admin \
          --email tamtest67@gmail.com \
          --password admin123
    restart: "no"
 
  # ============================================================
  # AIRFLOW — Scheduler (le moteur qui déclenche les DAGs)
  # ============================================================
 
  airflow-scheduler:
    <<: *airflow-common
    container_name: tam_airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
 
  # ============================================================
  # AIRFLOW — Interface web (accessible sur localhost:8888)
  # ============================================================
 
  airflow-webserver:
    <<: *airflow-common
    container_name: tam_airflow_webserver
    command: webserver
    ports:
      - "8888:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5


  ingest:
    build:
      context: ./data_pipeline
      dockerfile: dockerfile
    container_name: tam_pipeline_ingest
    env_file:
      - ./data_pipeline/.env 
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-tam_db}@postgres:5432/${DB_NAME:-brise_db}
      - KAFKA_SERVER=kafka:29092
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - tam_network
    restart: on-failure

  spark-process:
    image: apache/spark:3.5.0
    container_name: tam_pipeline_spark
    volumes:
      - ./data_pipeline:/opt/spark/work-dir
    user: root
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      spark-master:
        condition: service_started
    networks:
      - tam_network
    command: >
      /opt/spark/bin/spark-submit 
      --master spark://spark-master:7077
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.6.0
      /opt/spark/work-dir/spark_processing.py
    restart: on-failure

  spark-master:
    image: apache/spark:3.5.0
    container_name: tam_spark_master
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data_pipeline:/opt/spark/work-dir
    networks:
      - tam_network
    restart: on-failure
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    image: apache/spark:3.5.0
    container_name: tam_spark_worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - tam_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tam_back
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-tam_db}@postgres:5432/${DB_NAME:-brise_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-sJvJJBTG9IoNngjzingJUqVDXkecpA6SXorGIP4zoQ4}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - frontend_data:/app/frontend/build 
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tam_network

  nginx:
    image: nginx:alpine
    container_name: tam_front
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_data:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - tam_network
  
  # Base de métadonnées Superset (séparée de ta DB métier)
  superset-db:
    image: postgres:15-alpine
    container_name: tam_superset_db
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: tam__db
      POSTGRES_DB: superset_meta
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    networks:
      - tam_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset_meta"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    image: apache/superset:3.1.0
    container_name: tam_superset
    environment:
      - SUPERSET_SECRET_KEY=d5fb956be07f6c6956199f8b7718be0524c55e218b2d92919d9ed3514f2bae24
      - DATABASE_URL=postgresql+psycopg2://superset:tam__db@superset-db:5432/superset_meta
      - SUPERSET_WEBSERVER_PORT=8088
    ports:
      - "8088:8088"
    depends_on:
      superset-db:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    networks:
      - tam_network
    command: >
      bash -c "
        pip install psycopg2-binary &&
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname TAM
          --email tamtest67@gmail.com
          --password admin123 || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
      "

volumes:
  postgres_data:
  frontend_data:
  superset_db_data:   
  superset_home:
  airflow_db_data:

networks:
  tam_network:
    driver: bridge
